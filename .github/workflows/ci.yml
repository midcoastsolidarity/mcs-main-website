name: Continuous Integration

# Trigger on pushes and pull requests to the main branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for every job; jobs widen this only when needed.
permissions:
  contents: read

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------
  # Quality: formatting, CSS/HTML linting, and a yamllint pass over CI.
  # ----------------------------------------------------------------------
  quality:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        # 'npm ci' is preferred over 'npm install' in CI because it installs
        # strictly from package-lock.json.
        run: npm ci

      # --- HTML formatting and linting ---
      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint CSS (Stylelint)
        run: npm run lint:css

      - name: Lint HTML (Markuplint)
        run: npm run lint:html

      # --- Workflow linting ---
      - name: Install yamllint
        run: pipx install yamllint

      - name: Lint workflows (yamllint)
        run: yamllint -c config/yamllint.yml .github

  # ----------------------------------------------------------------------
  # Accessibility: pa11y-ci against the published pages.
  # ----------------------------------------------------------------------
  accessibility:
    name: Accessibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Accessibility tests (Pa11y)
        run: npm run test:a11y

  # ----------------------------------------------------------------------
  # Security: secret scanning, filesystem/misconfig scanning, and SCA.
  # ----------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dependency-review needs to read the PR to diff its dependencies.
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks can scan every commit, not just the tip.
          fetch-depth: 0

      # --- Secret scanning ---
      - name: Scan history for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Filesystem, misconfig, and secret scanning ---
      - name: Scan filesystem (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret

      # --- Software composition analysis ---
      - name: Scan dependencies (OSV-Scanner)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Audit dependencies (npm audit)
        # Informational: dev-only deps, so a finding should not block the run.
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Dependency review
        # Only meaningful on a pull request, where there is a base to diff.
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
