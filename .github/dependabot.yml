version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot bumps the pin and
  # updates the trailing version comment, so the workflow stays both pinned
  # and up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Dev-only tooling (linters, pa11y). The site ships no JS, so these never
  # reach production, but patched versions keep the security scans clean.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
